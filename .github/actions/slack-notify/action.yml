name: 'Slack incident notify'
description: 'Report a CI failure into the single active incident thread, or mark recovery.'

inputs:
  mode:
    description: 'report-failure or report-recovery'
    required: true
  job-label:
    description: 'Human-readable job name (for report-failure)'
    required: false
    default: ''
  trace-links-key:
    description: 'Optional Spaces object key with rendered Slack trace links (Playwright)'
    required: false
    default: ''
  slack-token:
    description: 'Slack bot token (chat:write, reactions:write)'
    required: true
  slack-channel:
    description: 'Slack channel ID'
    required: true
  spaces-key:
    description: 'DigitalOcean Spaces access key'
    required: true
  spaces-secret:
    description: 'DigitalOcean Spaces secret key'
    required: true
  spaces-bucket:
    description: 'Spaces bucket holding the incident state'
    required: true
  spaces-region:
    description: 'Spaces region (e.g. ams3)'
    required: true
  state-key:
    description: 'Spaces object key for the incident state (per branch)'
    required: false
    default: 'incidents/main.json'

runs:
  using: 'composite'
  steps:
    - name: Notify Slack
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack-token }}
        SLACK_CHANNEL_ID: ${{ inputs.slack-channel }}
        AWS_ACCESS_KEY_ID: ${{ inputs.spaces-key }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.spaces-secret }}
        SPACES_CI_BUCKET: ${{ inputs.spaces-bucket }}
        SPACES_CI_REGION: ${{ inputs.spaces-region }}
        STATE_KEY: ${{ inputs.state-key }}
        TRACE_LINKS_KEY: ${{ inputs.trace-links-key }}
        HEAD_SHA: ${{ github.sha }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        AUTHOR: ${{ github.event.head_commit.author.name }}
        COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: bash "$GITHUB_WORKSPACE/.github/scripts/slack-incident.sh" "${{ inputs.mode }}" "${{ inputs.job-label }}"
