# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main, ci-test, 'renovate/**' ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref. We only cancel on pull_request events so
# that pushes to main always run to completion (and keep their full check history).
# concurrency:
#   group: ci-${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  job_setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Determine changed packages
        uses: AurorNZ/paths-filter@7c547bdd24124b0d69e07c96b62fd7fec5ced19a # v3.0.1
        id: changed
        with:
          filters: |
            backend:
              - 'yarn.lock'
              - 'shared/**'
              - 'backend/**'
            frontend:
              - 'yarn.lock'
              - 'shared/**'
              - 'frontend/**'
            structures:
              - 'yarn.lock'
              - 'shared/**'
            models:
              - 'yarn.lock'
              - 'shared/**'
              - 'backend/shared/models/**'
            sql:
              - 'yarn.lock'
              - 'shared/structures/**'
              - 'shared/utility/**'
              - 'backend/shared/sql/**'
            playwright:
              - 'yarn.lock'
              - 'tests/playwright/**'

      # On pushes, paths-filter only diffs against the previous commit. If the
      # previous run was red, an unrelated commit would skip the broken job and
      # the branch would turn green without the failing tests ever re-running.
      # So: any job that failed in the most recent completed run on this branch
      # is forced to run again, regardless of which files changed.
      # (PR runs diff against the base branch, so they don't have this problem.)
      - name: Re-run jobs that failed in the previous run
        id: prev
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=${{ github.ref_name }}&event=push&status=completed&per_page=1" \
            --jq '.workflow_runs[0].id // empty' || true)

          failed=""
          if [ -n "$run_id" ]; then
            failed=$(gh api "repos/${{ github.repository }}/actions/runs/$run_id/jobs?per_page=100" --paginate \
              --jq '.jobs[] | select(.conclusion == "failure") | .name' || true)
          fi
          echo "Previous completed run: ${run_id:-none}"
          echo "Failed jobs in that run: ${failed:-none}"

          has() { printf '%s\n' "$failed" | grep -qxF "$1"; }

          # If setup or the shared build failed, the conditional jobs were all
          # skipped and their state is unknown: re-run everything.
          if has 'job_setup' || has 'Build shared packages'; then
            failed=$'Backend API Tests\nBackend Models Tests\nBackend SQL Tests\nStructures Tests\nComponents Browser Tests\nPlaywright Tests'
          fi

          {
            echo "backend=$(has 'Backend API Tests' && echo true || echo false)"
            echo "models=$(has 'Backend Models Tests' && echo true || echo false)"
            echo "sql=$(has 'Backend SQL Tests' && echo true || echo false)"
            echo "structures=$(has 'Structures Tests' && echo true || echo false)"
            echo "frontend=$(has 'Components Browser Tests' && echo true || echo false)"
            echo "playwright=$(has 'Playwright Tests' && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

    outputs:
      changed_backend: ${{ steps.changed.outputs.backend == 'true' || steps.prev.outputs.backend == 'true' }}
      changed_structures: ${{ steps.changed.outputs.structures == 'true' || steps.prev.outputs.structures == 'true' }}
      changed_models: ${{ steps.changed.outputs.models == 'true' || steps.prev.outputs.models == 'true' }}
      changed_sql: ${{ steps.changed.outputs.sql == 'true' || steps.prev.outputs.sql == 'true' }}
      changed_frontend: ${{ steps.changed.outputs.frontend == 'true' || steps.prev.outputs.frontend == 'true' }}
      rerun_playwright: ${{ steps.changed.outputs.playwright == 'true' || steps.prev.outputs.playwright == 'true' }}

  # Build all shared TypeScript packages exactly once and share the compiled output
  # (dist + tsbuildinfo) with every downstream job via an artifact. This removes the
  # duplicated `yarn build:shared` step from each consumer job.
  job_build_shared:
    name: 'Build shared packages'
    runs-on: ubuntu-latest
    needs: [job_setup]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Build shared packages
        run: yarn build:shared
      - name: Upload shared build output
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: shared-dist
          retention-days: 1
          if-no-files-found: error
          path: |
            shared/*/dist
            shared/*/*.tsbuildinfo
            backend/shared/*/dist
            backend/shared/*/*.tsbuildinfo

  job_test_backend:
    name: 'Backend API Tests'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_backend == 'true'
    services:
      mysql:
        image: mysql:8.4@sha256:8dbcf531a03aade657e181b9cf2f1d1803ce621a1d55610cb44cb531ab7d7db6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stamhoofd-tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Linting
        run: cd backend/app/api && yarn lint --quiet
      - name: Run tests
        run: cd backend/app/api && yarn build && yarn test --bail=1

  job_test_models:
    name: 'Backend Models Tests'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_models == 'true'
    services:
      mysql:
        image: mysql:8.4@sha256:8dbcf531a03aade657e181b9cf2f1d1803ce621a1d55610cb44cb531ab7d7db6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stamhoofd-tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Linting
        run: cd backend/shared/models && yarn lint --quiet
      - name: Run tests
        run: cd backend/shared/models && yarn build && yarn test --bail=1

  job_test_sql:
    name: 'Backend SQL Tests'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_sql == 'true'
    services:
      mysql:
        image: mysql:8.4@sha256:8dbcf531a03aade657e181b9cf2f1d1803ce621a1d55610cb44cb531ab7d7db6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stamhoofd-tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Linting
        run: cd backend/shared/sql && yarn lint --quiet
      - name: Run tests
        run: cd backend/shared/sql && yarn test --bail=1

  job_test_structures:
    name: 'Structures Tests'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_structures == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Linting
        run: cd shared/structures && yarn lint --quiet
      - name: Run tests
        run: cd shared/structures && yarn test --bail=1

  job_boot:
    name: 'API boot and shutdown'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    services:
      mysql:
        image: mysql:8.4@sha256:8dbcf531a03aade657e181b9cf2f1d1803ce621a1d55610cb44cb531ab7d7db6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stamhoofd-tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Build API
        run: cd backend/app/api && yarn build
      - name: Remove all installed dependencies
        run: yarn clear-dependencies
      - name: Install production dependencies only
        run: yarn install --prefer-offline --frozen-lockfile --production
      - name: Running migrations
        run: cd backend/app/api && NODE_ENV=test node ./dist/migrations.js
      - name: Run boot test
        run: NODE_ENV=test bash tests/boot/boot-test.sh

  job_test_lint_typecheck_checking:
    name: 'Lint and Typecheck'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Run type checking
        run: yarn -s typecheck
      - name: Run type linting
        run: yarn -s lint

  job_test_components_vitest:
    name: 'Components Browser Tests'
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_frontend == 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium
      - name: Download shared build output
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: shared-dist
      - name: Run components browser tests
        run: cd frontend/shared/components && yarn vitest run

  job_test_playwright:
    name: 'Playwright Tests'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [job_setup, job_build_shared]
    if: needs.job_setup.outputs.changed_backend == 'true' || needs.job_setup.outputs.changed_frontend == 'true' || needs.job_setup.outputs.rerun_playwright == 'true'
    permissions:
      contents: read
      pull-requests: write
    env:
      SPACES_CI_BUCKET: stamhoofd-ci-traces
      SPACES_CI_REGION: ams3
    services:
      mysql:
        image: mysql:8.4@sha256:8dbcf531a03aade657e181b9cf2f1d1803ce621a1d55610cb44cb531ab7d7db6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stamhoofd-tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
    - uses: ./.github/actions/setup
    - name: Restore CoreDNS cache
      id: cache-coredns
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .coredns
        key: coredns-v1.13.1
    - name: Install CoreDNS
      if: steps.cache-coredns.outputs.cache-hit != 'true'
      run: |
        mkdir -p .coredns
        curl -L -o .coredns/coredns.tgz \
        https://github.com/coredns/coredns/releases/download/v1.13.1/coredns_1.13.1_linux_amd64.tgz
        tar -xzf .coredns/coredns.tgz -C .coredns
        chmod +x .coredns/coredns
    - name: Add CoreDNS to PATH
      run: echo "${GITHUB_WORKSPACE}/.coredns" >> $GITHUB_PATH
    - name: Check CoreDNS version
      run: coredns -version
    - name: Disable default DNS
      run: |
        sudo systemctl stop systemd-resolved
        sudo systemctl disable systemd-resolved
        sudo rm /etc/resolv.conf
        echo "nameserver 127.0.0.1" | sudo tee /etc/resolv.conf
    - name: Run coredns
      run: export SERVER_IP=127.0.0.1 && . .development/loadenv.sh && sudo -E ./.coredns/coredns -conf .development/Corefile &
    - name: Use local DNS
      run: sudo sed -i '1inameserver 127.0.0.1' /etc/resolv.conf
    - name: Log coredns corefile path
      run: ps aux | grep coredns
    - name: Log corefile
      run: cat .development/Corefile
    - name: List DNS servers
      run: sudo cat /etc/resolv.conf
    - name: Log if DNS is running
      run: ps aux | grep coredns
    - name: Log if DNS is listening
      run: sudo netstat -tulnp | grep ":53"
    - name: Check DNS resolver
      run: dig test.stamhoofd @127.0.0.1
    - name: Check DNS resolution
      run: |
        DOMAIN="test.stamhoofd"
        EXPECTED_IP="127.0.0.1"

        ACTUAL_IP=$(dig +short A "$DOMAIN" | head -n1)

        echo "Expected IP: $EXPECTED_IP"
        echo "Actual IP:   $ACTUAL_IP"

        if [[ "$ACTUAL_IP" != "$EXPECTED_IP" ]]; then
            echo "❌ DNS check failed! $DOMAIN resolved to $ACTUAL_IP"
            exit 1
        fi

          echo "✅ DNS check passed!"
    # Now Caddy certificates are trusted by the system. Now we need to add it to Chromium as well.
    - name: Install libnss3-tools
      run: sudo apt-get update && sudo apt-get install -y libnss3-tools
    - name: Cache Playwright browsers
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
    - name: Install Playwright Browsers
      run: yarn playwright install --with-deps --no-shell chromium
    - name: Cache Caddy
      id: caddy-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: /usr/local/bin/caddy
        key: caddy-${{ runner.os }}-v2.10.2-replace-response
    - name: Install Caddy if missing
      if: steps.caddy-cache.outputs.cache-hit != 'true'
      # The Caddy config uses the replace_response handler (webshop strict-dynamic CSP nonce),
      # which the stock Caddy release does not bundle, so `caddy run`/`validate` would reject it.
      # Build a custom binary that compiles the plugin in via xcaddy, pinned to the same Caddy
      # version. This mirrors the custom Caddy image built for local dev (see caddy-service.ts).
      run: |
        go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
        "$(go env GOPATH)/bin/xcaddy" build v2.10.2 \
          --with github.com/caddyserver/replace-response \
          --output ./caddy
        sudo mv ./caddy /usr/local/bin/caddy
        sudo chmod +x /usr/local/bin/caddy
    - name: Verify Caddy
      run: caddy version
    - name: Give Caddy permissions to bind to privileged ports
      run: sudo setcap 'cap_net_bind_service=+ep' $(which caddy)
    - name: Caddy trust
      run: caddy start && sudo caddy trust && caddy stop
    - name: Log ca certificates
      run: sudo ls -la /usr/local/share/ca-certificates

    # Add chrome certificates to nss
    - name: Create initial NSS database for Chromium
      run: |
        mkdir -p $HOME/.pki/nssdb
        certutil -N -d sql:$HOME/.pki/nssdb --empty-password
    - name: Add trusted CA certificate to NSS
      run: certutil -d sql:$HOME/.pki/nssdb -A -t "C,," -n Caddy_Local_Authority -i /usr/local/share/ca-certificates/Caddy_Local_Authority*
    - name: Download shared build output
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        name: shared-dist
    - name: Build API
      run: cd backend/app/api && yarn build:playwright:pre
    - name: Run Playwright tests
      run: cd tests/playwright && yarn -s test
    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: playwright-traces
        path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
        retention-days: 1
    - name: Publish traces to Spaces & build notifications
      id: publish_traces
      if: failure()
      working-directory: tests/playwright
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_CI_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_CI_SECRET }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: bash scripts/publish-traces.sh
    - name: Comment trace links on PR
      if: failure() && github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        gh pr comment "$PR_NUMBER" --body-file "${RUNNER_TEMP}/pr-comment.md" --edit-last \
          || gh pr comment "$PR_NUMBER" --body-file "${RUNNER_TEMP}/pr-comment.md" \
          || echo "Could not post PR comment (read-only token on fork PR?)"

  # ---------------------------------------------------------------------------
  # Slack incident notifications (pushes to main only).
  #
  # One "incident" thread at a time, stored in Spaces. The first failing job in
  # the chain posts a root message and opens the incident; every later failure
  # (this run or a later commit while still red) replies in that thread. When a
  # later commit is fully green, job_notify_recovery posts a ✅ reply + reaction
  # and closes the incident, so the next failure starts a fresh thread.
  #
  # The jobs are chained via `needs` so exactly one runs at a time — this
  # serializes the read-modify-write of the incident state and guarantees a
  # single root even when many jobs fail at once. Passing jobs skip instantly
  # (no runner), so green runs cost nothing here.
  # ---------------------------------------------------------------------------
  notify_setup:
    name: 'Notify · Setup'
    runs-on: ubuntu-latest
    needs: [job_setup]
    if: ${{ !cancelled() && needs.job_setup.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Setup'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_build_shared:
    name: 'Notify · Build shared packages'
    runs-on: ubuntu-latest
    needs: [job_build_shared, notify_setup]
    if: ${{ !cancelled() && needs.job_build_shared.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Build shared packages'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_structures:
    name: 'Notify · Structures Tests'
    runs-on: ubuntu-latest
    needs: [job_test_structures, notify_build_shared]
    if: ${{ !cancelled() && needs.job_test_structures.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Structures Tests'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_sql:
    name: 'Notify · Backend SQL Tests'
    runs-on: ubuntu-latest
    needs: [job_test_sql, notify_structures]
    if: ${{ !cancelled() && needs.job_test_sql.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Backend SQL Tests'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_lint:
    name: 'Notify · Lint and Typecheck'
    runs-on: ubuntu-latest
    needs: [job_test_lint_typecheck_checking, notify_sql]
    if: ${{ !cancelled() && needs.job_test_lint_typecheck_checking.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Lint and Typecheck'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_models:
    name: 'Notify · Backend Models Tests'
    runs-on: ubuntu-latest
    needs: [job_test_models, notify_lint]
    if: ${{ !cancelled() && needs.job_test_models.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Backend Models Tests'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_backend:
    name: 'Notify · Backend API Tests'
    runs-on: ubuntu-latest
    needs: [job_test_backend, notify_models]
    if: ${{ !cancelled() && needs.job_test_backend.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Backend API Tests'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_components:
    name: 'Notify · Components Browser Tests'
    runs-on: ubuntu-latest
    needs: [job_test_components_vitest, notify_backend]
    if: ${{ !cancelled() && needs.job_test_components_vitest.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Components Browser Tests'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_boot:
    name: 'Notify · API boot and shutdown'
    runs-on: ubuntu-latest
    needs: [job_boot, notify_components]
    if: ${{ !cancelled() && needs.job_boot.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'API boot and shutdown'
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  notify_playwright:
    name: 'Notify · Playwright Tests'
    runs-on: ubuntu-latest
    needs: [job_test_playwright, notify_boot]
    if: ${{ !cancelled() && needs.job_test_playwright.result == 'failure' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: ./.github/actions/slack-notify
        with:
          mode: report-failure
          job-label: 'Playwright Tests'
          trace-links-key: traces/${{ github.run_id }}/${{ github.run_attempt }}/slack-links.txt
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json

  # When every CI job succeeds on a PR, check whether the PR carries the
  # "ready if CI succeeds" label. If it does and the PR is still a draft,
  # convert it to ready-for-review automatically.
  job_auto_ready:
    name: 'Auto ready for review'
    runs-on: ubuntu-latest
    needs:
      - job_setup
      - job_build_shared
      - job_test_structures
      - job_test_sql
      - job_test_lint_typecheck_checking
      - job_test_models
      - job_test_backend
      - job_test_components_vitest
      - job_boot
      - job_test_playwright
    if: |
      !cancelled() &&
      github.event_name == 'pull_request' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mark ready if labelled
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq '.isDraft')
          HAS_LABEL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | contains(["ready if CI succeeds"])')
          if [ "$IS_DRAFT" = "true" ] && [ "$HAS_LABEL" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$REPO" || true
            gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "ready if CI succeeds" || true
            echo "Marked PR #$PR_NUMBER as ready for review and removed the label"
          else
            echo "No action (isDraft=$IS_DRAFT, hasLabel=$HAS_LABEL)"
          fi

  # Recovery: runs after every job. When the run is fully green (no failures and
  # at least one job actually ran) and an incident is open, post ✅ and close it.
  job_notify_recovery:
    name: 'Notify · recovery'
    runs-on: ubuntu-latest
    needs:
      - job_setup
      - job_build_shared
      - job_test_structures
      - job_test_sql
      - job_test_lint_typecheck_checking
      - job_test_models
      - job_test_backend
      - job_test_components_vitest
      - job_boot
      - job_test_playwright
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: read
    steps:
      - name: Determine overall result
        id: status
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "needs results: $RESULTS"
          if printf '%s' "$RESULTS" | tr ',' '\n' | grep -qx 'failure'; then
            echo "green=false" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$RESULTS" | tr ',' '\n' | grep -qx 'success'; then
            echo "green=true" >> "$GITHUB_OUTPUT"
          else
            echo "green=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        if: steps.status.outputs.green == 'true'
      - uses: ./.github/actions/slack-notify
        if: steps.status.outputs.green == 'true'
        with:
          mode: report-recovery
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ github.ref_name == 'ci-test' && secrets.SLACK_CHANNEL_ID_TEST || secrets.SLACK_CHANNEL_ID }}
          spaces-key: ${{ secrets.SPACES_CI_KEY }}
          spaces-secret: ${{ secrets.SPACES_CI_SECRET }}
          spaces-bucket: stamhoofd-ci-traces
          spaces-region: ams3
          state-key: incidents/${{ github.ref_name }}.json
